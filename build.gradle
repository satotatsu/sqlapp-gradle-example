tasks.register('versionRepair', com.sqlapp.gradle.plugins.VersionRepairTask) {
}
*/

//Execute DB schema version down
tasks.register('versionDown', com.sqlapp.gradle.plugins.VersionDownTask) {
}

//Import to DB
tasks.register('importData', com.sqlapp.gradle.plugins.ImportDataTask) {
	debug = true
	dataSource {
		properties "${dataSourceProperties}"
	}
	parameters = [:]
	useSchemaNameDirectory = false
	directory = file("src/main/export")
	fileDirectory = file("src/main/resources")
	csvEncoding = "UTF8"
	sqlType = "MERGE_ROW"
	placeholderPrefix = '${'
	placeholderSuffix = '}'
	placeholders = true
	fileFilter {f->true}
	includeSchemas.addAll(targetSchemas)
//	includeTables "a", "b"
	tableOptions {
		commitPerTable = true
		dmlBatchSize = { table -> 500 }
//		withCoalesceAtUpdate={c->(c.name=='sub_service_class')}
		optimisticLockColumn={c->(c.name=='lock_version'||c.name=='version_no')}
	}
}

//Export from DB
tasks.register('exportData', com.sqlapp.gradle.plugins.ExportDataTask) {
	debug = true
	dataSource {
		properties "${dataSourceProperties}"
	}
	parameters=[:]
	useSchemaNameDirectory=false
	outputDirectory=file("src/main/export")
	csvEncoding="UTF8"
	//xls,xlsx,ods,csv,tsv,xml,json
	outputFileType="xlsx"
//	fileFilter={f->true}
	includeSchemas.addAll(targetSchemas)
	includeTables.addAll(exportDataTargetTables)
	tableOptions {
		
	}
}

