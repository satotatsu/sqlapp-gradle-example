plugins {
	id 'com.sqlapp.db' version '0.49.0'
	id 'java'
	id 'java-library'
	id 'eclipse'
}
apply plugin: 'com.sqlapp.db'

group = 'com.sqlapp'

java {
	withJavadocJar();
	withSourcesJar();
	sourceCompatibility = JavaVersion.VERSION_17
	targetCompatibility = JavaVersion.VERSION_17
	toolchain {
		languageVersion = JavaLanguageVersion.of(17);
	}
}
	
// Encoding
tasks.withType(JavaCompile).configureEach {
	options.encoding = defaultEncoding
}

tasks.withType(AbstractCompile).configureEach {
	it.options.encoding = defaultEncoding
}

tasks.withType(GroovyCompile).configureEach {
	groovyOptions.encoding = defaultEncoding
}


//def masterSchemaName="app_master${schemaNameSuffix}"
//def commonSchemaName="app_common${schemaNameSuffix}"
//def tranSchemaName="app_tran${schemaNameSuffix}"
//String[] targetSchemas=[masterSchemaName, commonSchemaName, tranSchemaName]
def targetSchemas=["PUBLIC"]

def changeLogTableName="changelog"

def exportDataTargetTables=[] as String[]
def exportXmlWithRowDumpTables=[] as String[]
def font="${font}"

// add Repository
repositories {
	mavenCentral()
}

configurations.configureEach {
	exclude group: 'log4j', module: 'log4j'
}

// search dependencies by http://mvnrepository.com/
dependencies {
	File libsFile=file('libs');
	if (libsFile.exists()&&libsFile.list()!=null&&libsFile.list().length>0) {
		implementation fileTree(dir: 'libs', include: '*.jar')
	} else {
		implementation("org.codehaus.janino:janino:3.1.12")
		//DB
		if ("${jdbc_driver}"!="") {
			implementation "${jdbc_driver}"
		}

		//sqlapp
		[
//			'sqlapp-core',
//			'sqlapp-command',
//			'sqlapp-gradle-plugin',
			"sqlapp-core-${db}"
		].each { name -> implementation "com.sqlapp:${name}:+" }
	}
}

wrapper {
	gradleVersion = '9.5.1'
}

//copy library
tasks.register('copyLib', Copy) {
	from configurations.implementation
	into 'libs'
}

//cleanup library
tasks.register('cleanLib') {
	doLast {
		delete layout.projectDirectory.dir('libs')
		mkdir layout.projectDirectory.dir('libs').asFile
	}
}

//cleanup and copy library
tasks.register('deploy') {
	dependsOn 'cleanLib', 'copyLib'
}

//Export Schema XML
exportXml {
	debug = false
	dataSource {
//		driverClassName=driverClassName
//		jdbcUrl=jdbcUrl
//		username=username
//		password=password
		properties "${dataSourceProperties}"
	}
//	target="catalog" or "schema" or "tables" or...
	target = "${schema_level}"
	outputDirectory = file("schemas")
	outputFileName = "${schema_level}.xml"
	dumpRows = true
	includeSchemas.addAll(targetSchemas)
	includeRowDumpTables.addAll(exportXmlWithRowDumpTables)
}

