	schemaOptions {
		outputCommit = false
		dropIfExists = true
		createIfNotExists = true
		decorateSchemaName = false
		setSearchPathToSchema = true
		tableOptions {
			
		}
	}
}

//Generate or Update Dictionaries for HTML
updateDictionaries {
	withSchema = { menuName -> true } //menuName=schemas or tables or column or etc
	targetFile = file("schemas/base/${schema_level}.xml")
	dictionaryFileDirectory = file("src/main/dictionaries")
	dictionaryFileType = "xlsx"
}

//Generate HTML Document
generateHtml {
	targetFile = file("schemas/base/${schema_level}.xml")
	dictionaryFileDirectory = file("src/main/dictionaries")
	dictionaryFileType = "xml"
	outputDirectory = file("html/")
	diagramFont = font //gradlew avaliableFonts
	multiThread = true
	//
	useSchemaNameDirectory = false
	directory = file("src/main/export")
	fileDirectory = file("src/main/resources")
	csvEncoding = "UTF8"
	placeholderPrefix = '${';
	placeholderSuffix = '}';
	placeholders = true;
	fileFilter = {f->true}
	//
	foreignKeyDefinitionDirectory = file("src/main/foreignkey")
}

tasks.register('generateDataGeneratorSetting', com.sqlapp.gradle.plugins.GenerateDataGeneratorSettingTask){
	debug = false
	dataSource {
		properties "${dataSourceProperties}"
	}
	outputDirectory=file("src/main/generator")
	sqlType='INSERT'  //INSERT Only
	fileType="EXCEL2007" //EXCEL2007 or YAML or JSON or TOML
	includeSchemas.addAll(targetSchemas)
//	excludeSchemas.addAll(targetSchemas)
//	includeTables.addAll(targetTables)
	excludeTables.addAll([changeLogTableName])
	onlyCurrentSchema=true
}

tasks.register('generateData', com.sqlapp.gradle.plugins.GenerateDataTask){
	debug = false
	dataSource {
		properties "${dataSourceProperties}"
	}
	evaluator.addPackageImports("data.generator")
	directory=file("src/main/generator")
	queryCommitInterval=500
	onlyCurrentSchema=true
}

